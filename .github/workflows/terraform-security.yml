name: Terraform Security

# Validates and security-scans Terraform on every change.
# Design note: this repo intentionally contains an INSECURE example for training,
# so tfsec/checkov run in REPORT mode (findings surface in the Security tab and logs)
# rather than hard-failing the build. terraform validate is the blocking gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  fmt-validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v3
      - name: terraform fmt (advisory)
        continue-on-error: true
        run: terraform fmt -check -recursive -diff
      - name: terraform validate (secure-baseline)  # blocking gate
        working-directory: examples/secure-baseline
        run: |
          terraform init -backend=false
          terraform validate

  tfsec:
    name: tfsec (report)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          sarif_file: tfsec.sarif
      - name: Upload tfsec SARIF
        if: github.event_name == 'push'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec.sarif
          category: tfsec

  checkov:
    name: Checkov (report)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          config_file: policies/checkov/.checkov.yaml
          soft_fail: true          # report findings, don't fail (insecure example is intentional)
